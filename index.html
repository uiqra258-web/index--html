<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Clothing Brand</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            text-align: center;
        }

        header {
            background-color: purple;
            color: white;
            padding: 20px;
        }

        h2 {
            color: purple;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 15px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background-color: purple;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: black;
        }

        footer {
            background-color: purple;
            color: white;
            padding: 15px;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <header>
        <h1>Welcome to Iqra Clothing Brand</h1>
        <p>Stylish and Comfortable Clothes For Everyone</p>
    </header>

    <h2>Our Products</h2>

    <section class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="T-Shirt">
            <h3>T-Shirts</h3>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500" alt="Hoodie">
            <h3>Hoodies</h3>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500" alt="Jeans">
            <h3>Jeans</h3>
            <button>Buy Now</button>
        </div>

    </section>

    <h2>Contact Us</h2>

    <p>Email us at:</p>

    <a href="mailto:uiqra258@gmail.com">
        uiqra258@gmail.com
    </a>

    <footer>
        <p>Made by Iqra © 2026</p>
    </footer>

</body>

</html>
